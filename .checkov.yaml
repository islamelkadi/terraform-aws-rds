# Checkov configuration for terraform-aws-rds
# Suppressions for checks that are not applicable to example/demo code

skip-check:
  # KMS IAM Policy - Intentional for flexible key policies in examples
  - CKV_AWS_111  # KMS module uses flexible IAM policies for demonstration purposes
  - CKV_AWS_356  # KMS module uses wildcard resources for flexibility in examples
  - CKV_AWS_109  # KMS module IAM policies are intentionally permissive for examples
  
  # Terraform Module Sources - Using semantic versioning tags
  - CKV_TF_1  # Using semantic version tags (?ref=v1.0.0) instead of commit hashes
  - CKV_TF_2  # Using semantic version tags (?ref=v1.0.0) which is a valid versioning strategy
  
  # VPC Public Subnet - Intentional design
  - CKV_AWS_130  # Public subnets are designed to auto-assign public IPs for resources that need internet access
  
  # RDS Copy Tags to Snapshots - Optional feature
  - CKV_AWS_313  # Copying tags to snapshots is optional. Users should enable based on their tagging requirements
  
  # RDS Deletion Protection - Now configurable but examples may disable for easier cleanup
  - CKV_AWS_139  # Deletion protection is now configurable with security validation. Examples may disable for easier cleanup
  - CKV_AWS_293  # Deletion protection is now configurable with security validation. Examples may disable for easier cleanup
  
  # RDS Performance Insights - Optional monitoring feature
  - CKV_AWS_353  # Performance Insights adds cost. Users should enable based on their monitoring requirements
  
  # CloudWatch Log Retention - Now configurable with security validation
  - CKV_AWS_338  # Log retention is now configurable with security validation based on environment
  
  # RDS Query Logging - Optional monitoring feature
  - CKV2_AWS_27  # Query logging adds cost and performance overhead. Users should enable based on their monitoring and compliance requirements
  
  # RDS AWS Backup - Optional backup strategy
  - CKV2_AWS_8  # AWS Backup adds complexity. Examples use native RDS backups. Users should implement based on their backup strategy
